name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  ci:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build:ci
        env:
          # Required by Next.js build — dummy values are fine for build-time checks
          POSTGRES_URL: postgresql://ci:ci@localhost:5432/ci
          BETTER_AUTH_SECRET: ci-secret-placeholder-32-chars-ok
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          OPENROUTER_API_KEY: sk-or-v1-placeholder

      # Unit tests — runs automatically once a test script is added to package.json
      - name: Unit tests
        if: ${{ hashFiles('vitest.config.*') != '' }}
        run: pnpm test --run

      # E2E tests — runs automatically once Playwright is configured
      - name: E2E tests
        if: ${{ hashFiles('playwright.config.*') != '' }}
        run: pnpm exec playwright test
